---
# Lint/type/fmt gate — CI lint job on ubuntu-latest (see .github/workflows/ci.yml).
# Clippy runs on ubuntu in the Test job (`shared-key: test` cache). That job must not
# share the lint job's `shared-key: coverage` cache: clippy rebuilds target/ without
# instrumentation and would invalidate llvm-cov artifacts saved on the lint runner.
# Test jobs run full `cargo nextest run` in parallel with lint.
# Full operator safety net before push:
#   cargo test --manifest-path greenfloor-engine/Cargo.toml  (CI: cargo nextest run)
#
# Speed tips:
#   export PRE_COMMIT_HOME="$(pwd)/.cache/pre-commit"  # reuse hook envs (CI caches this path)
#   pre-commit run --all-files                         # ~5–10s warm; first run installs prettier/yamllint

repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (greenfloor-engine)
        entry: cargo fmt --manifest-path greenfloor-engine/Cargo.toml --check
        language: system
        pass_filenames: false
        files: ^greenfloor-engine/

      - id: cargo-clippy
        # --tests: integration tests + lib `#[cfg(test)]` modules; skips bin-only recompile from --all-targets.
        name: cargo clippy (greenfloor-engine, clippy::all + pedantic)
        entry: cargo clippy --manifest-path greenfloor-engine/Cargo.toml --lib --bins --tests --no-deps
        language: system
        pass_filenames: false
        files: ^greenfloor-engine/

      - id: ruff
        name: ruff
        entry: ruff check --fix
        language: system
        types: [python]

      - id: audit-event-direct-calls
        name: audit event direct calls
        entry: scripts/check_audit_event_direct_calls.sh
        language: system
        pass_filenames: false
        files: ^greenfloor-engine/

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]

      - id: pyright
        name: pyright
        entry: pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: yamllint
        name: yamllint
        entry: yamllint
        language: system
        files: "\\.(ya?ml)$"

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: "\\.(ya?ml|json|md)$"
