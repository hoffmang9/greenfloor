---
# Lint/type/fmt/clippy gate — CI runs full pre-commit on ubuntu-latest only (see .github/workflows/ci.yml).
# All three CI runners then run `cargo test` in parallel.
# Full operator safety net before push:
#   cargo test --manifest-path greenfloor-engine/Cargo.toml
#
# Speed tips:
#   export PRE_COMMIT_HOME="$(pwd)/.cache/pre-commit"  # reuse hook envs (CI caches this path)
#   pre-commit run --all-files                         # ~5–10s warm; first run installs prettier/yamllint

repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (greenfloor-engine)
        entry: cargo fmt --manifest-path greenfloor-engine/Cargo.toml --check
        language: system
        pass_filenames: false
        files: ^greenfloor-engine/

      - id: cargo-clippy
        # Runs `clippy::all` + `clippy::pedantic` deny from greenfloor-engine/Cargo.toml.
        name: cargo clippy (greenfloor-engine, clippy::all + pedantic)
        entry: cargo clippy --manifest-path greenfloor-engine/Cargo.toml --all-targets --no-deps
        language: system
        pass_filenames: false
        files: ^greenfloor-engine/

      - id: ruff
        name: ruff
        entry: ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]

      - id: pyright
        name: pyright
        entry: pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: yamllint
        name: yamllint
        entry: yamllint
        language: system
        files: "\\.(ya?ml)$"

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: "\\.(ya?ml|json|md)$"
