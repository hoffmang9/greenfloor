---
# Fast lint/type gate — matches CI pre-commit step (see .github/workflows/ci.yml).
# Full operator safety net before push:
#   cargo fmt --manifest-path greenfloor-engine/Cargo.toml --check
#   cargo clippy --manifest-path greenfloor-engine/Cargo.toml --all-targets
#   cargo test --manifest-path greenfloor-engine/Cargo.toml
#   pytest
#
# Speed tips:
#   export PRE_COMMIT_HOME="$(pwd)/.cache/pre-commit"  # reuse hook envs (CI caches this path)
#   pre-commit run --all-files                         # ~5–10s warm; first run installs prettier/yamllint

repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]

      - id: pyright
        name: pyright
        entry: pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: yamllint
        name: yamllint
        entry: yamllint
        language: system
        files: "\\.(ya?ml)$"

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: "\\.(ya?ml|json|md)$"
