app:
  network: "mainnet"
  home_dir: "__HOME_DIR__"
  log_level: INFO
runtime:
  loop_interval_seconds: 30
  dry_run: false
chain_signals:
  tx_block_trigger:
    mode: "websocket"
    websocket_url: "wss://api.coinset.org/ws"
    websocket_reconnect_interval_seconds: 1
    fallback_poll_interval_seconds: 1
dev:
  python:
    min_version: "3.11"
notifications:
  low_inventory_alerts:
    enabled: false
    threshold_mode: "absolute_base_units"
    default_threshold_base_units: 0
    dedup_cooldown_seconds: 60
    clear_hysteresis_percent: 10
  providers:
    - type: pushover
      enabled: false
      user_key_env: "PUSHOVER_USER_KEY"
      app_token_env: "PUSHOVER_APP_TOKEN"
      recipient_key_env: "PUSHOVER_RECIPIENT_KEY"
venues:
  dexie:
    api_base: "__DEXIE_API_BASE__"
  splash:
    api_base: "http://localhost:4000"
  offer_publish:
    provider: "dexie"
coin_ops:
  max_operations_per_run: 0
  max_daily_fee_budget_mojos: 0
  split_fee_mojos: 0
  combine_fee_mojos: 0
keys:
  registry:
    - key_id: "key-main-1"
      fingerprint: 123456789
      network: "mainnet"
      keyring_yaml_path: "~/.chia_keys/keyring.yaml"
