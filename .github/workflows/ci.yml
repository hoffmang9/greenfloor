---
name: CI

"on":
  pull_request:
  push:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"
  CARGO_MANIFEST: greenfloor-engine/Cargo.toml

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # gate: Python/YAML lint + Rust fmt/clippy/test on ubuntu-latest
          # cross-test: cargo test only (arm + macOS compile/run parity)
          - os: ubuntu-latest
            ci_profile: gate
          - os: ubuntu-24.04-arm
            ci_profile: cross-test
          - os: macos-14
            ci_profile: cross-test

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        if: matrix.ci_profile == 'gate'
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Node is required to install and run the explicit Prettier check in CI.
      - uses: actions/setup-node@v4
        if: matrix.ci_profile == 'gate'
        with:
          node-version: "lts/*"

      - name: Restore Python venv cache
        if: matrix.ci_profile == 'gate'
        id: cache-venv
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: venv-v2-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('pyproject.toml') }}

      - name: Create venv and install dev dependencies
        if: matrix.ci_profile == 'gate'
        run: |
          if [ ! -d .venv/bin ]; then
            python -m venv .venv
          fi
          # GITHUB_PATH only affects later steps; export PATH is required here.
          export PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Save Python venv cache
        if: matrix.ci_profile == 'gate' && steps.cache-venv.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .venv
          key: venv-v2-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('pyproject.toml') }}

      - uses: ./.github/actions/rust-cache-greenfloor

      - name: Cache pre-commit environment
        if: matrix.ci_profile == 'gate'
        uses: actions/cache@v4
        with:
          path: ./.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-${{ runner.arch }}-py311-

      - name: "Lint + Type-check (pre-commit)"
        if: matrix.ci_profile == 'gate'
        env:
          PRE_COMMIT_HOME: ${{ github.workspace }}/.cache/pre-commit
          SKIP: cargo-fmt,cargo-clippy
        run: pre-commit run --all-files

      - name: Rust gate
        run: |
          if [ "${{ matrix.ci_profile }}" = "gate" ]; then
            cargo fmt --manifest-path "${{ env.CARGO_MANIFEST }}" --check
            cargo clippy --manifest-path "${{ env.CARGO_MANIFEST }}" --lib --bins --no-deps
          fi
          cargo test --manifest-path "${{ env.CARGO_MANIFEST }}"

      - name: Install greenfloor native CLIs on PATH
        if: matrix.ci_profile == 'gate'
        run: |
          for bin in greenfloor-engine greenfloor-manager greenfloord; do
            install -m 755 "target/debug/${bin}" "$GITHUB_WORKSPACE/.venv/bin/${bin}"
          done
