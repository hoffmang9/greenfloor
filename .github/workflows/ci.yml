---
name: CI

"on":
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  CARGO_MANIFEST: greenfloor-engine/Cargo.toml

jobs:
  lint:
    name: Lint and format (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Restore Python venv cache
        id: cache-venv
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: venv-v2-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('pyproject.toml') }}

      - name: Create venv and install dev dependencies
        run: |
          if [ ! -d .venv/bin ]; then
            python -m venv .venv
          fi
          export PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Save Python venv cache
        if: steps.cache-venv.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .venv
          key: venv-v2-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('pyproject.toml') }}

      - uses: ./.github/actions/rust-cache-greenfloor
        with:
          save-cache: "false"
          install-nextest: "false"

      - name: Cache pre-commit environment
        uses: actions/cache@v4
        with:
          path: ./.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-${{ runner.arch }}-py311-

      - name: Lint and format
        env:
          PRE_COMMIT_HOME: ${{ github.workspace }}/.cache/pre-commit
        run: |
          set -euo pipefail
          pids=()
          for hook in ruff ruff-format pyright yamllint prettier; do
            pre-commit run "${hook}" --all-files &
            pids+=($!)
          done
          (
            cargo fmt --manifest-path "${{ env.CARGO_MANIFEST }}" --check
            cargo clippy --manifest-path "${{ env.CARGO_MANIFEST }}" --lib --bins --tests --no-deps
          ) &
          pids+=($!)
          status=0
          for pid in "${pids[@]}"; do
            wait "${pid}" || status=1
          done
          exit "${status}"

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore Python venv cache
        id: cache-venv
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: venv-v2-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('pyproject.toml') }}

      - name: Create venv and install package
        run: |
          if [ ! -d .venv/bin ]; then
            python -m venv .venv
          fi
          export PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          python -m pip install --upgrade pip
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            python -m pip install -e ".[dev]"
          else
            python -m pip install -e .
          fi

      - name: Save Python venv cache
        if: steps.cache-venv.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .venv
          key: venv-v2-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('pyproject.toml') }}

      - uses: ./.github/actions/rust-cache-greenfloor
        with:
          install-nextest: "true"

      - name: Install cargo-llvm-cov
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install Rust llvm-tools for coverage
        if: matrix.os == 'ubuntu-latest'
        run: rustup component add llvm-tools-preview

      - name: Build and test greenfloor-engine
        if: matrix.os != 'ubuntu-latest'
        run: cargo nextest run --manifest-path "${{ env.CARGO_MANIFEST }}"

      - name: Build, test, and coverage gate (ubuntu-latest)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo llvm-cov nextest run --manifest-path "${{ env.CARGO_MANIFEST }}"
          cargo llvm-cov report --manifest-path "${{ env.CARGO_MANIFEST }}" --lcov --output-path lcov.info

      - name: Script adapter unit tests
        if: matrix.os != 'ubuntu-latest'
        run: |
          cd scripts
          PYTHONPATH=. python -m unittest greenfloor_scripts.test_adapters

      - name: Script adapter coverage gate (ubuntu-latest)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd scripts
          python -m coverage run -m unittest greenfloor_scripts.test_adapters
          python -m coverage xml -o ../coverage-python.xml
          python -m coverage report --fail-under=76 --include='greenfloor_scripts/*'

      - name: Upload coverage artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            lcov.info
            coverage-python.xml
          if-no-files-found: error
