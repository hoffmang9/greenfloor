---
name: CI

"on":
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
      - "**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  CARGO_MANIFEST: greenfloor-engine/Cargo.toml
  DIFF_COVER_FAIL_UNDER: "80"

jobs:
  lint:
    name: Lint, format, and coverage (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Detect diff coverage scope
        id: scope
        run: |
          git fetch origin main
          bash .github/scripts/diff-coverage-scope.sh origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Restore Python venv cache
        id: cache-venv
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: venv-v2-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('pyproject.toml') }}

      - name: Create venv and install dev dependencies
        run: |
          if [ ! -d .venv/bin ]; then
            python -m venv .venv
          fi
          export PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Save Python venv cache
        if: steps.cache-venv.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .venv
          key: venv-v2-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('pyproject.toml') }}

      - uses: ./.github/actions/rust-cache-greenfloor
        with:
          shared-key: coverage
          save-cache: "true"
          install-nextest: ${{ steps.scope.outputs.run_rust_cov }}

      - name: Install cargo-llvm-cov
        if: steps.scope.outputs.run_rust_cov == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install Rust llvm-tools for coverage
        if: steps.scope.outputs.run_rust_cov == 'true'
        run: rustup component add llvm-tools-preview

      - name: Cache pre-commit environment
        uses: actions/cache@v4
        with:
          path: ./.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-${{ runner.arch }}-py311-

      - name: Lint, format, and coverage (parallel)
        env:
          PRE_COMMIT_HOME: ${{ github.workspace }}/.cache/pre-commit
        run: |
          set -euo pipefail
          pids=()
          for hook in ruff ruff-format pyright yamllint prettier audit-event-direct-calls cargo-fmt; do
            pre-commit run "${hook}" --all-files &
            pids+=($!)
          done
          if [ "${{ steps.scope.outputs.run_rust_cov }}" = "true" ]; then
            (
              cargo llvm-cov nextest run \
                --manifest-path "${{ env.CARGO_MANIFEST }}"
              cargo llvm-cov report \
                --manifest-path "${{ env.CARGO_MANIFEST }}" \
                --lcov \
                --output-path lcov.info
            ) &
            pids+=($!)
          fi
          if [ "${{ steps.scope.outputs.run_py_cov }}" = "true" ]; then
            (
              cd scripts
              python -m coverage run -m unittest greenfloor_scripts.test_adapters
              python -m coverage xml -o ../coverage-python.xml
            ) &
            pids+=($!)
          fi
          status=0
          for pid in "${pids[@]}"; do
            wait "${pid}" || status=1
          done
          exit "${status}"

      - name: Diff coverage gate (changed lines only)
        if: >-
          steps.scope.outputs.run_rust_cov == 'true'
          || steps.scope.outputs.run_py_cov == 'true'
        run: |
          status=0
          if [ "${{ steps.scope.outputs.run_rust_cov }}" = "true" ]; then
            diff-cover lcov.info \
              --compare-branch=origin/main \
              --fail-under="${{ env.DIFF_COVER_FAIL_UNDER }}" \
              --include-untracked \
              --exclude '**/tests/**' '**/test_support/**' '**/test_env/**' \
              --exclude '**/test_overrides/**' '**/bin/**' '**/main.rs' \
              || status=1
          fi
          if [ "${{ steps.scope.outputs.run_py_cov }}" = "true" ]; then
            diff-cover coverage-python.xml \
              --compare-branch=origin/main \
              --fail-under="${{ env.DIFF_COVER_FAIL_UNDER }}" \
              --include-untracked \
              || status=1
          fi
          exit "${status}"

      - name: Upload coverage artifacts
        if: >-
          steps.scope.outputs.run_rust_cov == 'true'
          || steps.scope.outputs.run_py_cov == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            lcov.info
            coverage-python.xml
          if-no-files-found: ignore

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore Python venv cache
        id: cache-venv
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: venv-v2-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('pyproject.toml') }}

      - name: Create venv and install package
        run: |
          if [ ! -d .venv/bin ]; then
            python -m venv .venv
          fi
          export PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Save Python venv cache
        if: steps.cache-venv.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .venv
          key: venv-v2-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('pyproject.toml') }}

      - uses: ./.github/actions/rust-cache-greenfloor
        with:
          shared-key: test
          install-nextest: "true"

      - name: Clippy (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: >-
          cargo clippy --manifest-path "${{ env.CARGO_MANIFEST }}"
          --lib --bins --tests --no-deps

      - name: Build and test greenfloor-engine
        run: cargo nextest run --manifest-path "${{ env.CARGO_MANIFEST }}"

      - name: Script adapter unit tests
        run: |
          cd scripts
          PYTHONPATH=. python -m unittest greenfloor_scripts.test_adapters
