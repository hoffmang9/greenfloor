---
name: CI

"on":
  pull_request:
  push:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"

jobs:
  rust-signer:
    name: Rust signer test and Ubuntu wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            greenfloor-signer -> target
            greenfloor-native -> target
            greenfloor-signer-pyo3 -> target
          cache-workspace-crates: true

      - name: Build and test greenfloor-signer
        run: |
          cargo build --manifest-path greenfloor-signer/Cargo.toml
          cargo test --manifest-path greenfloor-signer/Cargo.toml

      - uses: ./.github/actions/maturin-wheel
        with:
          operation: restore-build
          crate-tree-path: greenfloor-native
          manifest-path: greenfloor-native/Cargo.toml
          cache-key-prefix: native-wheelhouse
          wheelhouse-subdir: greenfloor-native

      - uses: ./.github/actions/maturin-wheel
        with:
          operation: restore-build
          crate-tree-path: greenfloor-signer-pyo3
          manifest-path: greenfloor-signer-pyo3/Cargo.toml
          cache-key-prefix: signer-pyo3-wheelhouse
          wheelhouse-subdir: greenfloor-signer-pyo3

  lint-type-test:
    name: Lint, Type, Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      VENV_CACHE_KEY: venv-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('pyproject.toml') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            run_sdk_integration: true
          - os: ubuntu-24.04-arm
            run_sdk_integration: false
          - os: macos-14
            run_sdk_integration: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Node is required to install and run the explicit Prettier check in CI.
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Restore Python venv cache
        id: cache-venv
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: ${{ env.VENV_CACHE_KEY }}

      - name: Create venv and install dev dependencies
        run: |
          if [ ! -d .venv/bin ]; then
            python -m venv .venv
          fi
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Save Python venv cache
        if: steps.cache-venv.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .venv
          key: ${{ env.VENV_CACHE_KEY }}

      - uses: ./.github/actions/maturin-wheel
        id: native-wheel
        with:
          operation: restore
          crate-tree-path: greenfloor-native
          manifest-path: greenfloor-native/Cargo.toml
          cache-key-prefix: native-wheelhouse
          wheelhouse-subdir: greenfloor-native

      - uses: ./.github/actions/maturin-wheel
        id: signer-pyo3-wheel
        with:
          operation: restore
          crate-tree-path: greenfloor-signer-pyo3
          manifest-path: greenfloor-signer-pyo3/Cargo.toml
          cache-key-prefix: signer-pyo3-wheelhouse
          wheelhouse-subdir: greenfloor-signer-pyo3

      - uses: dtolnay/rust-toolchain@stable
        if: |
          steps.native-wheel.outputs.cache-hit != 'true'
          || steps.signer-pyo3-wheel.outputs.cache-hit != 'true'
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        if: |
          steps.native-wheel.outputs.cache-hit != 'true'
          || steps.signer-pyo3-wheel.outputs.cache-hit != 'true'
        with:
          workspaces: |
            greenfloor-signer -> target
            greenfloor-native -> target
            greenfloor-signer-pyo3 -> target
          cache-workspace-crates: true

      - uses: ./.github/actions/maturin-wheel
        if: steps.native-wheel.outputs.cache-hit != 'true'
        with:
          operation: build
          crate-tree-path: greenfloor-native
          manifest-path: greenfloor-native/Cargo.toml
          cache-key-prefix: native-wheelhouse
          wheelhouse-subdir: greenfloor-native
          tree-sha: ${{ steps.native-wheel.outputs.tree-sha }}

      - uses: ./.github/actions/maturin-wheel
        if: steps.signer-pyo3-wheel.outputs.cache-hit != 'true'
        with:
          operation: build
          crate-tree-path: greenfloor-signer-pyo3
          manifest-path: greenfloor-signer-pyo3/Cargo.toml
          cache-key-prefix: signer-pyo3-wheelhouse
          wheelhouse-subdir: greenfloor-signer-pyo3
          tree-sha: ${{ steps.signer-pyo3-wheel.outputs.tree-sha }}

      - uses: ./.github/actions/maturin-wheel
        with:
          operation: install
          crate-tree-path: greenfloor-native
          manifest-path: greenfloor-native/Cargo.toml
          cache-key-prefix: native-wheelhouse
          wheelhouse-subdir: greenfloor-native

      - uses: ./.github/actions/maturin-wheel
        with:
          operation: install
          crate-tree-path: greenfloor-signer-pyo3
          manifest-path: greenfloor-signer-pyo3/Cargo.toml
          cache-key-prefix: signer-pyo3-wheelhouse
          wheelhouse-subdir: greenfloor-signer-pyo3

      - name: Cache pre-commit environment
        uses: actions/cache@v4
        with:
          path: ./.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-${{ runner.arch }}-py311-

      - name: "Lint + Type-check (pre-commit)"
        env:
          PRE_COMMIT_HOME: ${{ github.workspace }}/.cache/pre-commit
          SKIP: pytest
        run: pre-commit run --all-files

      - name: "Test suite (pytest)"
        run: pytest -v --tb=short

      - uses: ./.github/actions/pip-wheel
        if: matrix.run_sdk_integration
        with:
          operation: restore-build-install
          tree-path: chia-wallet-sdk
          package-path: ./chia-wallet-sdk/pyo3
          cache-key-prefix: sdk-wheelhouse
          wheelhouse-subdir: chia-wallet-sdk

      - name: Pytest (greenfloor-native + chia-wallet-sdk offer round-trip on Ubuntu)
        if: matrix.run_sdk_integration
        run: GREENFLOOR_RUN_NATIVE_INTEGRATION_TESTS=1 pytest -vv -s tests/test_greenfloor_native_integration.py
