---
name: CI

"on":
  pull_request:
  push:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"

jobs:
  # Wheel caches are keyed by runner.os and runner.arch so x86_64 and ARM64
  # runners maintain separate wheelhouses. rust-signer validates Rust and
  # populates Ubuntu x86_64 wheels; ARM/macOS matrix legs ensure their own
  # platform wheels on cache miss without duplicating Ubuntu x86_64 builds.
  rust-signer:
    name: Rust signer test and Ubuntu x86_64 wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: ./.github/actions/rust-cache-greenfloor

      - name: Build and test greenfloor-signer
        run: |
          cargo build --manifest-path greenfloor-signer/Cargo.toml
          cargo test --manifest-path greenfloor-signer/Cargo.toml

      - uses: ./.github/actions/wheel-cache
        with:
          operation: ensure
          builder: maturin
          tree-path: greenfloor-native
          source-path: greenfloor-native/Cargo.toml
          cache-key-prefix: native-wheelhouse
          wheelhouse-subdir: greenfloor-native

      - uses: ./.github/actions/wheel-cache
        with:
          operation: ensure
          builder: maturin
          tree-path: greenfloor-signer-pyo3
          source-path: greenfloor-signer-pyo3/Cargo.toml
          cache-key-prefix: signer-pyo3-wheelhouse
          wheelhouse-subdir: greenfloor-signer-pyo3

  lint-type-test:
    name: Lint, Type, Test (${{ matrix.os }})
    needs: rust-signer
    runs-on: ${{ matrix.os }}
    env:
      VENV_CACHE_KEY: venv-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('pyproject.toml') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            run_sdk_integration: true
            build_wheels_on_miss: false
          - os: ubuntu-24.04-arm
            run_sdk_integration: false
            build_wheels_on_miss: true
          - os: macos-14
            run_sdk_integration: false
            build_wheels_on_miss: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Node is required to install and run the explicit Prettier check in CI.
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Restore Python venv cache
        id: cache-venv
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: ${{ env.VENV_CACHE_KEY }}

      - name: Create venv and install dev dependencies
        run: |
          if [ ! -d .venv/bin ]; then
            python -m venv .venv
          fi
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Save Python venv cache
        if: steps.cache-venv.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .venv
          key: ${{ env.VENV_CACHE_KEY }}

      - uses: ./.github/actions/wheel-cache
        with:
          operation: ensure
          builder: maturin
          tree-path: greenfloor-native
          source-path: greenfloor-native/Cargo.toml
          cache-key-prefix: native-wheelhouse
          wheelhouse-subdir: greenfloor-native
          build-on-cache-miss: ${{ matrix.build_wheels_on_miss }}
          setup-rust-on-miss: ${{ matrix.build_wheels_on_miss }}

      - uses: ./.github/actions/wheel-cache
        with:
          operation: ensure
          builder: maturin
          tree-path: greenfloor-signer-pyo3
          source-path: greenfloor-signer-pyo3/Cargo.toml
          cache-key-prefix: signer-pyo3-wheelhouse
          wheelhouse-subdir: greenfloor-signer-pyo3
          build-on-cache-miss: ${{ matrix.build_wheels_on_miss }}
          setup-rust-on-miss: ${{ matrix.build_wheels_on_miss }}

      - uses: ./.github/actions/wheel-cache
        with:
          operation: install
          wheelhouse-subdir: greenfloor-native

      - uses: ./.github/actions/wheel-cache
        with:
          operation: install
          wheelhouse-subdir: greenfloor-signer-pyo3

      - name: Cache pre-commit environment
        uses: actions/cache@v4
        with:
          path: ./.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-${{ runner.arch }}-py311-

      - name: "Lint + Type-check (pre-commit)"
        env:
          PRE_COMMIT_HOME: ${{ github.workspace }}/.cache/pre-commit
          SKIP: pytest
        run: pre-commit run --all-files

      - name: "Test suite (pytest)"
        run: pytest -v --tb=short

      - uses: ./.github/actions/wheel-cache
        if: matrix.run_sdk_integration
        with:
          operation: ensure
          builder: pip
          tree-path: chia-wallet-sdk
          source-path: ./chia-wallet-sdk/pyo3
          cache-key-prefix: sdk-wheelhouse
          wheelhouse-subdir: chia-wallet-sdk
          setup-rust-on-miss: "true"

      - uses: ./.github/actions/wheel-cache
        if: matrix.run_sdk_integration
        with:
          operation: install
          wheelhouse-subdir: chia-wallet-sdk

      - name: Pytest (greenfloor-native + chia-wallet-sdk offer round-trip on Ubuntu)
        if: matrix.run_sdk_integration
        run: GREENFLOOR_RUN_NATIVE_INTEGRATION_TESTS=1 pytest -vv -s tests/test_greenfloor_native_integration.py
