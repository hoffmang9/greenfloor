---
name: CI

"on":
  pull_request:
  push:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"
  CARGO_MANIFEST: greenfloor-engine/Cargo.toml

jobs:
  lint-type-test:
    name: Lint, Type, Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            run_precommit: true
            run_rust_tests: true
            build_native_clis: true
          - os: ubuntu-24.04-arm
            run_precommit: false
            run_rust_tests: true
            build_native_clis: true
          - os: macos-14
            run_precommit: false
            run_rust_tests: true
            build_native_clis: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Node is required to install and run the explicit Prettier check in CI.
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Restore Python venv cache
        id: cache-venv
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: venv-v2-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('pyproject.toml') }}

      - name: Create venv and install dev dependencies
        run: |
          if [ ! -d .venv/bin ]; then
            python -m venv .venv
          fi
          # GITHUB_PATH only affects later steps; export PATH is required here.
          export PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Save Python venv cache
        if: steps.cache-venv.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .venv
          key: venv-v2-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('pyproject.toml') }}

      - uses: ./.github/actions/rust-cache-greenfloor
        if: matrix.build_native_clis || matrix.run_rust_tests

      - name: Cache pre-commit environment
        if: matrix.run_precommit
        uses: actions/cache@v4
        with:
          path: ./.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ runner.arch }}-py311-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-${{ runner.arch }}-py311-

      - name: "Lint + Type-check (pre-commit)"
        if: matrix.run_precommit
        env:
          PRE_COMMIT_HOME: ${{ github.workspace }}/.cache/pre-commit
          # Python/YAML only; Rust fmt/clippy run in the dedicated gate step below.
          SKIP: cargo-fmt,cargo-clippy
        run: pre-commit run --all-files

      - name: Rust fmt, clippy, and test
        if: matrix.run_rust_tests && matrix.run_precommit
        run: |
          cargo fmt --manifest-path "${{ env.CARGO_MANIFEST }}" --check
          # lib+bins only: integration tests compile in the test profile during
          # `cargo test`; clippy --all-targets would rebuild them twice on CI.
          cargo clippy --manifest-path "${{ env.CARGO_MANIFEST }}" --lib --bins --no-deps
          cargo test --manifest-path "${{ env.CARGO_MANIFEST }}"

      - name: Build and test greenfloor-engine
        if: matrix.run_rust_tests && !matrix.run_precommit
        run: cargo test --manifest-path "${{ env.CARGO_MANIFEST }}"

      - name: Install greenfloor native CLIs on PATH
        if: matrix.build_native_clis
        run: |
          for bin in greenfloor-engine greenfloor-manager greenfloord; do
            install -m 755 "target/debug/${bin}" "$GITHUB_WORKSPACE/.venv/bin/${bin}"
          done
