---
name: GreenFloor Rust cache
description: Install the stable Rust toolchain and restore GreenFloor Cargo caches.

inputs:
  save-cache:
    description: Save the Cargo cache at job end (lint+coverage and test jobs populate it).
    required: false
    default: "true"
  shared-key:
    description: >-
      Swatinem/rust-cache shared-key namespace. Use `test` for clippy and plain
      nextest. Use `coverage` for llvm-cov instrumented builds. The ubuntu lint job
      runs clippy on `test`, then restores `coverage` before incremental llvm-cov so
      non-instrumented clippy artifacts are not saved into the coverage cache.
    required: false
    default: "test"
  install-nextest:
    description: Install cargo-nextest (disable on jobs that only build or lint).
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ inputs.shared-key }}
        workspaces: |
          greenfloor-engine -> target
        cache-workspace-crates: true
        save-if: ${{ inputs.save-cache == 'true' }}

    - uses: taiki-e/install-action@v2
      if: ${{ inputs.install-nextest == 'true' }}
      with:
        tool: nextest
