---
name: GreenFloor Rust cache
description: Install the stable Rust toolchain and restore GreenFloor Cargo caches.

inputs:
  save-cache:
    description: Save the Cargo cache at job end (disable on lint; test jobs populate it).
    required: false
    default: "true"
  install-nextest:
    description: Install cargo-nextest (disable on jobs that only build or lint).
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          greenfloor-engine -> target
        cache-workspace-crates: true
        save-if: ${{ inputs.save-cache == 'true' }}

    - uses: taiki-e/install-action@v2
      if: ${{ inputs.install-nextest == 'true' }}
      with:
        tool: nextest
