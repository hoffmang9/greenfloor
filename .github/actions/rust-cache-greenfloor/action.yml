---
name: GreenFloor Rust cache
description: Install the stable Rust toolchain and restore GreenFloor Cargo caches.

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          greenfloor-engine -> target
        cache-workspace-crates: true

    - uses: taiki-e/install-action@v2
      with:
        tool: nextest
