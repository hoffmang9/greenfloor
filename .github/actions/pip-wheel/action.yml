name: Pip wheel cache
description: Restore, build, save, and install a pip wheel for a local Python package.

inputs:
  operation:
    description: restore, build, install, restore-build, or restore-build-install
    required: true
  tree-path:
    description: Git tree path used for cache keys (for example chia-wallet-sdk)
    required: true
  package-path:
    description: Local package path passed to pip wheel
    required: true
  cache-key-prefix:
    description: Prefix for the GitHub Actions cache key
    required: true
  wheelhouse-subdir:
    description: Directory under .cache/wheelhouse/
    required: true
  tree-sha:
    description: Optional tree SHA when operation is build and restore was already run
    required: false
    default: ""

outputs:
  cache-hit:
    description: Whether the wheel cache restore hit
    value: ${{ steps.restore.outputs.cache-hit }}
  tree-sha:
    description: Git tree SHA used for the cache key
    value: ${{ steps.tree.outputs.sha }}

runs:
  using: composite
  steps:
    - id: tree
      if: inputs.operation != 'install'
      shell: bash
      run: |
        if [ -n "${{ inputs.tree-sha }}" ]; then
          echo "sha=${{ inputs.tree-sha }}" >> "$GITHUB_OUTPUT"
        else
          echo "sha=$(git rev-parse HEAD:${{ inputs.tree-path }})" >> "$GITHUB_OUTPUT"
        fi

    - id: restore
      if: contains(fromJSON('["restore", "restore-build", "restore-build-install"]'), inputs.operation)
      uses: actions/cache/restore@v4
      with:
        path: .cache/wheelhouse/${{ inputs.wheelhouse-subdir }}
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.tree.outputs.sha }}

    - name: Build pip wheel (cache miss)
      if: |
        (
          contains(fromJSON('["build", "restore-build", "restore-build-install"]'), inputs.operation)
          && (
            inputs.operation == 'build'
            || steps.restore.outputs.cache-hit != 'true'
          )
        )
      shell: bash
      run: |
        mkdir -p ".cache/wheelhouse/${{ inputs.wheelhouse-subdir }}"
        python -m pip wheel \
          --wheel-dir ".cache/wheelhouse/${{ inputs.wheelhouse-subdir }}" \
          "${{ inputs.package-path }}"

    - name: Save pip wheel cache
      if: |
        (
          contains(fromJSON('["build", "restore-build", "restore-build-install"]'), inputs.operation)
          && (
            inputs.operation == 'build'
            || steps.restore.outputs.cache-hit != 'true'
          )
        )
      uses: actions/cache/save@v4
      with:
        path: .cache/wheelhouse/${{ inputs.wheelhouse-subdir }}
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.tree.outputs.sha }}

    - name: Install pip wheel
      if: contains(fromJSON('["install", "restore-build-install"]'), inputs.operation)
      shell: bash
      run: python -m pip install ".cache/wheelhouse/${{ inputs.wheelhouse-subdir }}"/*.whl
